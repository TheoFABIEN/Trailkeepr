<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>⛰️ My Outdoor Archive</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<link rel="stylesheet" href="style.css">

<style>
#map {
    height: 100vh;
}
</style>

</head>


<body>

<div id="gpxModal" class="modal">
  <div class="modal-content">
    <h2>Import GPX file</h2>
    <input type="file" id="gpxFile" accept=".gpx"><br><br>
    <label>Name</label>
    <input type="text" id="gpxName" placeholder="Name of the hike">
    <label>Difficulty</label>
    <select id="gpxDifficulty">
      <option value="">Unknown</option>
      <option value="1">1 - Easy</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5 - Hard</option>
    </select>
    <label>Exposure</label>
    <select id="gpxGaz">
      <option value="">Unknown</option>
      <option value="true">Yes</option>
      <option value="false">No</option>
    </select>
    <label>Notes</label>
    <textarea id="gpxNotes" rows="6" placeholder="Notes about the hike..."></textarea>
    <div class="modal-buttons">
      <button id="submitGPX">Import</button>
      <button id="cancelGPX">Cancel</button>
    </div>
  </div>
</div>

<div id="sidebar">

  <div class="main-title">My Outdoor Archive</div>

  <div id="upload-gpx">
    <div id="secondary-text-header">Upload your track data and add it to the database.</div>
    <button id="openGPXModal">Import GPX file</button>
  </div>

  <div id="newTypeBox">
  <h3>ADD OTHER ELEMENT</h3>
  <select id="newType" class="selectButton-alt">
    <option value="point">Point of interest</option>
    <option value="area">Area</option>
  </select>
  <button id="startAdd" class="applyButton">⚐ &ensp; Add on the map</button>
  </div>

  <div id="filtersBox">
  <h3>HIKE FILTERS</h3>
  <p>
    <div class="distance-header">
      <p class="secondary-text">Max distance</p>
      <span id="distanceValue">50+ km</span>
    </div>
    <input type="range"
           id="distanceSlider"
           min="0"
           max="50"
           step="1"
           value="50">
  </p>
  <p class="secondary-text">Difficulty</p>
  <p>
  <select id="difficulty" class="selectButton">
    <option value="">All</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
  </p>
  <p class="secondary-text">Exposure to void</p>
  <p>
  <select id="gaz" class="selectButton">
    <option value="">All</option>
    <option value="true">Yes</option>
    <option value="false">No</option>
  </select>
  </p>
  <button id="applyFilters" class="applyButton">Apply</button>
  </div>

  <div id="layersBox">
  <h3>MAP OBJECTS</h3>
  <label class="toggle">
    <span class="label-text">GPX tracks</span>
    <input type="checkbox" id="toggleGPX" checked>
    <span class="slider"></span>
  </label>
  <label class="toggle">
    <span class="label-text">Points of interest</span>
    <input type="checkbox" id="togglePoints" checked>
    <span class="slider"></span>
  </label>
  <label class="toggle">
    <span class="label-text">Areas</span>
    <input type="checkbox" id="toggleAreas" checked>
    <span class="slider"></span>
  </label>

  </div>

</div>


<div id="map"></div>

<button id="mobileToggle">☰</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="script.js"></script>

<script>
    var geocoder = L.Control.geocoder({
      defaultMarkGeocode: false,
      collapsed: false,
      placeholder: "Search adventures"
    })
    .on('markgeocode', function (e) {
      var bbox = e.geocode.bbox;
      map.fitBounds(bbox);
    });
    geocoder.addTo(map);
    setTimeout(() => {
      const container = document.querySelector('.leaflet-control-geocoder');
      document.getElementById('map').appendChild(container);
    }, 0);
</script>

</body>
</html>
