<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>⛰️ My Outdoor Archive</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">

<style>
#map {
height: 100vh;
}
</style>

</head>


<div id="gpxModal" class="modal">
  <div class="modal-content">
    <h2>Import GPX Track</h2>
    <label>Name</label>
    <input type="text" id="gpxName" placeholder="Name of the hike">
    <label>Difficulty</label>
    <select id="gpxDifficulty">
      <option value="">Unknown</option>
      <option value="1">1 - Easy</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5 - Hard</option>
    </select>
    <label>Exposure</label>
    <select id="gpxGaz">
      <option value="">Unknown</option>
      <option value="true">Yes</option>
      <option value="false">No</option>
    </select>
    <label>Notes</label>
    <textarea id="gpxNotes" rows="6" placeholder="Notes about the hike..."></textarea>
    <div class="modal-buttons">
      <button id="submitGPX">Import</button>
      <button id="cancelGPX">Cancel</button>
    </div>
  </div>
</div>



<body>

<div id="sidebar" style="padding:10px; background:#fff;">
  <h3>Hike filters : </h3>

  <p>
  <label for="difficulty">Difficulty of hikes :</label>
  <select id="difficulty">
    <option value="">All</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
  </p>

  <p>
  <label for="gaz">Exposure to the void :</label>
  <select id="gaz">
    <option value="">All</option>
    <option value="true">Yes</option>
    <option value="false">No</option>
  </select>
  </p>

  <button id="applyFilters">Apply</button>

  <h3>Layers</h3>
  <input type="checkbox" id="toggleGPX" checked>GPX tracks<br>
  <input type="checkbox" id="togglePoints" checked>Points of interest<br>
  <input type="checkbox" id="toggleAreas" checked>Areas<br>


  <h3>Add GPX</h3>
    <input type="file" id="gpxFile" accept=".gpx">
    <button id="uploadGPX">Import GPX</button>

  <h3>Add new element</h3>
  <select id="newType">
    <option value="">--Choose an option--</option>
    <option value="point">Point of interest</option>
    <option value="area">Area</option>
  </select>
  <button id="startAdd">Add on the map</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css">

<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script src="script.js"></script>

</body>
</html>
